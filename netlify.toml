[build]
  command = "npm run build"
  publish = "dist"

# Shared deal link preview - serve HTML with OG meta tags for link previews
[[redirects]]
  from = "/deal/share/:token"
  to = "/.netlify/functions/deal-share-preview?token=:token"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
